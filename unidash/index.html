<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UniDash</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background-color: black;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

/* Main framed window */
.overlay {
  background: url('assets/background_unicornsky.png') center center / cover no-repeat;
  padding: 70px 50px;
  border-radius: 32px;
  max-width: 650px;
  width: 90%;
  box-shadow: 0 25px 70px rgba(0,0,0,0.7);
  color: white;
  position: relative;
  overflow: hidden;
}

/* Dark tint for readability */
.overlay::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
  border-radius: 32px;
}

/* Ensure text sits above tint */
.overlay > * {
  position: relative;
  z-index: 1;
}

.logo {
  width: 200px;
  margin-bottom: 20px;
}

h1 {
  font-size: 42px;
  margin: 10px 0;
}

p {
  font-size: 18px;
  margin: 10px 0 30px 0;
}

a {
  color: #ffd700;
  font-weight: bold;
  text-decoration: none;
  font-size: 16px;
}

a:hover {
  text-decoration: underline;
}

.footer {
  margin-top: 30px;
  font-size: 14px;
  opacity: 0.85;
}
</style>
</head>

<body>

<div class="overlay">

<img src="assets/logo_unidash.png" alt="UniDash Logo" class="logo">

<h1>UniDash</h1>
<p>Fast. Magical. Delivered.</p>

<p>Local delivery platform currently in beta testing.</p>

<a href="privacy.html">Privacy Policy</a>

<div class="footer">
Operated by YOUR_LLC_NAME
</div>

</div>

</body>
</html>
