<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UniDash</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background-color: black;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
}

/* Framed container */
.overlay {
  background-color: black;
  padding: 20px;
  border-radius: 36px;
  max-width: 700px;
  width: 92%;
  box-shadow: 0 25px 70px rgba(0,0,0,0.7);
}

/* Inner background image panel */
.background-panel {
  background: url('assets/background_unicornsky.png') center center no-repeat;
  background-size: contain; /* FULL image visible */
  padding: 80px 40px;
  border-radius: 28px;
  position: relative;
  color: white;
}

/* Subtle dark overlay for text readability */
.background-panel::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
  border-radius: 28px;
}

.background-panel > * {
  position: relative;
  z-index: 1;
}

.logo {
  width: 200px;
  margin-bottom: 20px;
}

h1 {
  font-size: 42px;
  margin: 10px 0;
}

p {
  font-size: 18px;
  margin: 10px 0 30px 0;
}

a {
  color: #ffd700;
  font-weight: bold;
  text-decoration: none;
  font-size: 16px;
}

a:hover {
  text-decoration: underline;
}

.footer {
  margin-top: 30px;
  font-size: 14px;
  opacity: 0.85;
}
</style>
</head>

<body>

<div class="overlay">

  <div class="background-panel">

    <img src="assets/logo_unidash.png" alt="UniDash Logo" class="logo">

    <h1>UniDash</h1>
    <p>Fast. Magical. Delivered.</p>

    <p>Local delivery platform currently in beta testing.</p>

    <a href="privacy.html">Privacy Policy</a>

    <div class="footer">
      Operated by YOUR_LLC_NAME
    </div>

  </div>

</div>

</body>
</html>
